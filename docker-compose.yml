version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ticketing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticketing_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ticketing}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticketing} -d ${POSTGRES_DB:-ticketing}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ticketing-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ticketing-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: ${API_PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-ticketing}:${POSTGRES_PASSWORD:-ticketing_secret}@postgres:5432/${POSTGRES_DB:-ticketing}?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_HOURS: ${JWT_EXPIRES_HOURS:-24}
      BOOKING_TTL_MINUTES: ${BOOKING_TTL_MINUTES:-10}
      QUEUE_SESSION_TTL_MINUTES: ${QUEUE_SESSION_TTL_MINUTES:-5}
    ports:
      - "${API_PORT:-8080}:8080"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: ticketing-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NUXT_PUBLIC_API_BASE: http://api:8080
      NUXT_PUBLIC_SITE_NAME: ${SITE_NAME:-War Tiket}
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
  redis_data:
